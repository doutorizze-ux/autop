services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3521:5000"
    volumes:
      - ./backend/sessions:/app/backend/sessions
      - ./backend/data:/app/backend/data
    environment:
      - DATABASE_URL=file:///app/backend/data/dev.db
      - JWT_SECRET=${JWT_SECRET:-secret}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SCRAPERAPI_KEY=${SCRAPERAPI_KEY}
      - SCRAPER_PROXY=${SCRAPER_PROXY}
      - SCRAPER_CONCURRENCY=${SCRAPER_CONCURRENCY:-2}
      - SCRAPER_SUPPLIER_TIMEOUT_MS=${SCRAPER_SUPPLIER_TIMEOUT_MS:-120000}
      - HEADLESS=${HEADLESS:-true}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3520:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: autocrm_network
