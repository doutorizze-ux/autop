services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${BACKEND_PORT:-3521}:5000"
    volumes:
      - ./backend/sessions:/app/backend/sessions
      - ./backend/data:/app/backend/data
    environment:
      - DATABASE_URL=file:///app/backend/data/dev.db
      - JWT_SECRET=${JWT_SECRET:-secret}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LOCAL_AGENT_TOKEN=${LOCAL_AGENT_TOKEN}
      - LOCAL_AGENT_MODE=${LOCAL_AGENT_MODE:-enabled}
      - LOCAL_AGENT_REQUIRE_FOR_SEARCH=${LOCAL_AGENT_REQUIRE_FOR_SEARCH:-true}
      - LOCAL_AGENT_FALLBACK_ON_FAILURE=${LOCAL_AGENT_FALLBACK_ON_FAILURE:-false}
      - LOCAL_AGENT_TASK_TIMEOUT_MS=${LOCAL_AGENT_TASK_TIMEOUT_MS:-180000}
      - LOCAL_AGENT_SESSION_TASK_TIMEOUT_MS=${LOCAL_AGENT_SESSION_TASK_TIMEOUT_MS:-120000}
      - LOCAL_AGENT_HEARTBEAT_TIMEOUT_MS=${LOCAL_AGENT_HEARTBEAT_TIMEOUT_MS:-45000}
      - SCRAPER_CONCURRENCY=${SCRAPER_CONCURRENCY:-7}
      - SCRAPER_SUPPLIER_TIMEOUT_MS=${SCRAPER_SUPPLIER_TIMEOUT_MS:-165000}
      - SCRAPER_CACHE_TTL_MS=${SCRAPER_CACHE_TTL_MS:-600000}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3520}:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: autocrm_network
