services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3521:5000"
    volumes:
      - ./backend/sessions:/app/backend/sessions
      - ./backend/prisma:/app/backend/prisma
    environment:
      - JWT_SECRET=${JWT_SECRET:-secret}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3520:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: autocrm_network
