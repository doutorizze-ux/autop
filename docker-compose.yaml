services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${BACKEND_PORT:-3521}:5000"
    volumes:
      - ./backend/sessions:/app/backend/sessions
      - ./backend/data:/app/backend/data
    environment:
      - DATABASE_URL=file:///app/backend/data/dev.db
      - JWT_SECRET=${JWT_SECRET:-secret}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3520}:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: autocrm_network
